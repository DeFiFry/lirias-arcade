### Lirias-Arcade generated RetroArch config
### Port 1 has keyboard fallback bindings so the cabinet is playable with
### no gamepad connected. All 4 ports are gamepad-autodetect enabled, so
### RetroArch assigns connected controllers to players 1-4 in the order
### they're plugged in (no manual joypad_index pinning needed).
### 4-player-capable cores (FBNeo, MAME) use all 4 active ports as-is;
### 2-player cores (SNES, Genesis, PSX, PS2) simply won't read ports 3/4.

input_max_users = "4"
input_autodetect_enable = "true"
input_autodetect_joypad_type = "true"

# ---- Port 1: keyboard fallback ----
input_player1_up = "up"
input_player1_down = "down"
input_player1_left = "left"
input_player1_right = "right"
input_player1_a = "x"
input_player1_b = "z"
input_player1_x = "s"
input_player1_y = "a"
input_player1_l = "q"
input_player1_r = "w"
input_player1_l2 = "1"
input_player1_r2 = "2"
input_player1_l3 = "num1"
input_player1_r3 = "num2"
input_player1_start = "enter"
input_player1_select = "rshift"

# ---- Ports 1-4: gamepad autoconfig ----
# RetroArch auto-assigns each connected joypad to the next free player
# port in connection order. Leaving joypad_index unset per-port so
# autodetect handles it; uncomment below only if you need to pin a
# specific controller to a specific port.
# input_player1_joypad_index = "0"
# input_player2_joypad_index = "1"
# input_player3_joypad_index = "2"
# input_player4_joypad_index = "3"

# ---- Menu / hotkeys ----
input_menu_toggle = "f1"
input_save_state = "f2"
input_load_state = "f4"
input_toggle_fullscreen = "f9"
input_screenshot = "f12"
input_exit_emulator = "escape"

# ---- Video ----
video_fullscreen = "true"
video_windowed_fullscreen = "true"

# ---- System/BIOS ----
# Legally-acquired BIOS files (scph1001.bin, scph5501.bin, scph7001.bin for
# PSX; SCPH-70004 BIOS set for PS2/LRPS2; etc.) live here. RetroArch uses
# this single directory for every core's BIOS lookup, not just PSX's.
system_directory = "E:/Projects/Lirias-Arcade/bios"
